<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>প্রফেশনাল ইনভেন্টরি রিপোর্ট - ইউসুফ আলী</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    
    <style>
        body { font-family: 'Inter', 'Hind Siliguri', sans-serif; }
        .dataTables_wrapper .dataTables_filter input {
            border: 1px solid #e2e8f0; border-radius: 12px; padding: 8px 16px; margin-left: 10px; outline: none;
        }
        .dataTables_wrapper .dataTables_paginate .paginate_button.current {
            background: #4f46e5 !important; color: white !important; border: none !important; border-radius: 8px;
        }
        table.dataTable thead th { border-bottom: 1px solid #f1f5f9; }
        table.dataTable no-footer { border-bottom: none; }
    </style>
</head>
<body class="bg-[#F8FAFC]">

<div class="max-w-[1400px] mx-auto p-4 md:p-10">
    
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-6">
        <div>
            <div class="flex items-center gap-3 mb-2">
                <span class="bg-indigo-600 text-white p-2 rounded-xl">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
                    </svg>
                </span>
                <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">স্টক অ্যানালাইসিস</h1>
            </div>
            <p class="text-slate-500 font-medium">সিস্টেম আর্কিটেক্ট: <span class="text-indigo-600 font-bold uppercase tracking-wide">ইউসুফ আলী</span></p>
        </div>
        
        <div class="flex gap-3">
            <button class="flex items-center gap-2 bg-white border border-slate-200 text-slate-700 px-5 py-2.5 rounded-xl font-semibold shadow-sm hover:bg-slate-50 transition">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>
                রিপোর্ট ডাউনলোড
            </button>
            <button class="bg-indigo-600 text-white px-6 py-2.5 rounded-xl font-bold shadow-lg shadow-indigo-200 hover:bg-indigo-700 active:scale-95 transition">
                অটো অর্ডার জেনারেট
            </button>
        </div>
    </div>

    <div class="bg-white rounded-[32px] shadow-2xl shadow-slate-200/60 border border-slate-100 overflow-hidden">
        
        <div class="px-8 py-6 border-b border-slate-50 flex flex-col md:flex-row justify-between items-center bg-white gap-4">
            <h2 class="text-xl font-bold text-slate-800 flex items-center gap-3">
                ইনভেন্টরি ডাটাবেজ 
                <span class="text-[10px] bg-green-100 text-green-700 px-2 py-1 rounded-md">লাইভ আপডেট</span>
            </h2>
            <div class="flex items-center gap-4 text-sm font-semibold">
                <span class="text-slate-400">ফিল্টার:</span>
                <select class="bg-slate-50 border-none rounded-lg px-4 py-2 text-slate-600 outline-none focus:ring-2 focus:ring-indigo-500">
                    <option>সকল সাপ্লায়ার</option>
                </select>
            </div>
        </div>

        <div class="p-4 md:p-8 overflow-x-auto">
            <table id="yusuf-table" class="w-full text-left">
                <thead>
                    <tr class="text-slate-400 text-xs uppercase tracking-[0.15em] border-b border-slate-100">
                        <th class="pb-6 px-4">আইটেম ও ক্যাটাগরি</th>
                        <th class="pb-6 px-4 text-center">স্টক লেভেল</th>
                        <th class="pb-6 px-4 text-center">সেলস গ্রোথ</th>
                        <th class="pb-6 px-4">অ্যানালাইসিস</th>
                        <th class="pb-6 px-4 text-right">ম্যানেজমেন্ট</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-50">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

<script>
    $(document).ready(function() {
        $('#yusuf-table').DataTable({
            processing: true,
            serverSide: true, // এটি ২০ মিলিয়ন ডাটার জন্য মাস্ট
            ajax: "{{ route('your.data.route') }}", 
            columns: [
                { data: 'product_info', name: 'name', class: 'py-6 px-4' },
                { data: 'stock', name: 'stock', class: 'text-center font-bold text-slate-700 py-6 px-4' },
                { data: 'growth', name: 'growth', class: 'text-center py-6 px-4' },
                { data: 'status', name: 'status', class: 'py-6 px-4' },
                { data: 'action', name: 'action', orderable: false, searchable: false, class: 'text-right py-6 px-4' }
            ],
            language: {
                search: "",
                searchPlaceholder: "প্রোডাক্ট খুঁজুন...",
                lengthMenu: "_MENU_ টি দেখান",
                info: "মোট _TOTAL_ টি ডাটার মধ্যে _START_-_END_ দেখাচ্ছেন",
            },
            dom: '<"flex justify-between items-center mb-4"f>rt<"flex justify-between items-center mt-6"ip>'
        });
    });
</script>

</body>
</html>
